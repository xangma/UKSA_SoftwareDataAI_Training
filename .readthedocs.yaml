# Read the Docs configuration file for MyST/Jupyter Book.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details.

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
    nodejs: "22"
  commands:
    - npm ci
    - npm run check:docs
    - npm run build:docs
    - mkdir -p "$READTHEDOCS_OUTPUT/html"
    - cp -r _build/html/. "$READTHEDOCS_OUTPUT/html"
