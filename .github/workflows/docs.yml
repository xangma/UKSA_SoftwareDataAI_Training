name: Docs

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xangma/uksa-software-data-ai-training
  GITOPS_REPO: icg-innovation/space-k8s-gitops
  GITOPS_OWNER: icg-innovation
  GITOPS_REPOSITORY: space-k8s-gitops
  GITOPS_BRANCH: main
  GITOPS_FILE: apps/base/uksa-training-jupyterbook/deployment.yaml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install docs dependencies
        run: npm ci

      - name: Check repository hygiene
        run: npm run check:docs

      - name: Build static book
        run: npm run build:docs

  container:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_ref: ${{ steps.image-ref.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture immutable image reference
        id: image-ref
        run: echo "image_ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

      - name: Smoke check container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          CONTAINER="uksa-docs-smoke-$$"
          docker run -d --name "$CONTAINER" -p 8080:8080 "$IMAGE"
          trap 'docker rm -f "$CONTAINER" >/dev/null 2>&1 || true' EXIT
          sleep 3

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/jupyterbook/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: /jupyterbook/ returned $STATUS"
            docker logs "$CONTAINER"
            exit 1
          fi

          REDIRECT=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/uksa-training/)
          if [ "$REDIRECT" != "301" ]; then
            echo "FAIL: /uksa-training/ returned $REDIRECT"
            docker logs "$CONTAINER"
            exit 1
          fi

  open-gitops-pr:
    name: Open GitOps PR
    runs-on: ubuntu-latest
    needs: container
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check required GitHub App configuration
        env:
          SPACE_GITOPS_APP_CLIENT_ID: ${{ vars.SPACE_GITOPS_APP_CLIENT_ID }}
          SPACE_GITOPS_APP_PRIVATE_KEY: ${{ secrets.SPACE_GITOPS_APP_PRIVATE_KEY }}
        run: |
          test -n "$SPACE_GITOPS_APP_CLIENT_ID" || {
            echo "::error::Missing required Actions variable SPACE_GITOPS_APP_CLIENT_ID"
            exit 1
          }

          test -n "$SPACE_GITOPS_APP_PRIVATE_KEY" || {
            echo "::error::Missing required Actions secret SPACE_GITOPS_APP_PRIVATE_KEY"
            exit 1
          }

      - name: Create GitOps GitHub App token
        id: gitops-app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.SPACE_GITOPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.SPACE_GITOPS_APP_PRIVATE_KEY }}
          owner: ${{ env.GITOPS_OWNER }}
          repositories: ${{ env.GITOPS_REPOSITORY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Check out GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ steps.gitops-app-token.outputs.token }}
          path: gitops
          persist-credentials: false

      - name: Update pinned image digest
        working-directory: gitops
        env:
          IMAGE_REF: ${{ needs.container.outputs.image_ref }}
          IMAGE_REPOSITORY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          GITOPS_FILE: ${{ env.GITOPS_FILE }}
        run: |
          set -euo pipefail

          perl -0pi -e 's#image:\s+\Q$ENV{IMAGE_REPOSITORY}\E(?::[A-Za-z0-9_.-]+|@sha256:[a-f0-9]+)#image: $ENV{IMAGE_REF}#g' "$GITOPS_FILE"

          grep -q "$IMAGE_REF" "$GITOPS_FILE"
          grep -n "image:" "$GITOPS_FILE"
          git diff -- "$GITOPS_FILE"

      - name: Create or update GitOps pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.gitops-app-token.outputs.token }}
          path: gitops
          base: ${{ env.GITOPS_BRANCH }}
          branch: automation/uksa-training-jupyterbook-image
          delete-branch: true
          commit-message: "Update UKSA training JupyterBook image to ${{ needs.container.outputs.image_ref }}"
          title: "Update UKSA training JupyterBook image to ${{ github.sha }}"
          body: |
            Automated image promotion from `${{ github.repository }}`.

            Image:
            `${{ needs.container.outputs.image_ref }}`

            Source commit:
            `${{ github.sha }}`

            Workflow run:
            `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`
          add-paths: |
            ${{ env.GITOPS_FILE }}
